apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  # Faz o argocd-server servir HTTP puro (sem redirect para HTTPS),
  # para acessar em http://localhost:8081 via port-forward na porta 80.
  # Apenas para ambiente local/aula — em produção use Ingress com TLS.
  server.insecure: "true"
