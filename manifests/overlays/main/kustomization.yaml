apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nest-api-main
resources:
  - ../../base
  - rollout.yaml
  - analysis-template.yaml
  - hpa.yaml
  - servicemonitor.yaml
  - grafana-dashboard.yaml
images:
  - name: nest-api
    newTag: main
patches:
  # No main a app roda como Rollout (rollout.yaml), então removemos o
  # Deployment que vem da base. O Service da base continua sendo usado.
  - target:
      kind: Deployment
      name: nest-api
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nest-api
