apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nest-api
spec:
  scaleTargetRef:
    # O HPA precisa mirar o Rollout, não o Deployment, senão escala o alvo errado.
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: nest-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
