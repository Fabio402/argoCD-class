apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aula-geovane
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Fabio402/argoCD-class.git
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: teste
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
 