apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nest-api-main
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Fabio402/argoCD-class.git
    targetRevision: main
    path: manifests/overlays/main
  destination:
    server: https://kubernetes.default.svc
    namespace: nest-api-main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nest-api-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Fabio402/argoCD-class.git
    targetRevision: dev
    path: manifests/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: nest-api-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
